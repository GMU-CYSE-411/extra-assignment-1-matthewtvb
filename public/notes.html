<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <a class="back-link" href="/">Home</a>
        <h1>Notes</h1>
      </section>

      <section class="panel">
        <h2>Search Notes</h2>
        <!-- Removed hidden ownerId field; server derives the owner from the session -->
        <form id="search-form" class="stacked-form compact">
          <label>
            Search
            <input type="text" name="search" placeholder="keyword" />
          </label>
          <button type="submit">Search</button>
        </form>
      </section>

      <section class="panel">
        <h2>Create Note</h2>
        <!-- Removed hidden ownerId field; server assigns ownership from the session -->
        <form id="create-note-form" class="stacked-form">
          <label>
            Title
            <input type="text" name="title" required />
          </label>
          <label>
            Body
            <textarea name="body" rows="4"></textarea>
          </label>
          <label class="inline">
            <input type="checkbox" name="pinned" />
            Pin this note
          </label>
          <button type="submit">Save Note</button>
        </form>
      </section>

      <section class="panel">
        <h2>Your Notes</h2>
        <div id="notes-list" class="notes-grid">Loading...</div>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/notes.js"></script>
  </body>
</html>
