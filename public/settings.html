<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="page narrow">
      <section class="panel">
        <a class="back-link" href="/">Home</a>
        <h1>Settings</h1>
      </section>

      <section class="panel">
        <h2>Your Profile</h2>
        <div id="status-preview" class="preview-card"></div>
      </section>

      <section class="panel">
        <h2>Edit Settings</h2>
        <!-- Removed hidden userId field; server derives the target user from the session -->
        <form id="settings-form" class="stacked-form">
          <label>
            Display Name
            <input type="text" name="displayName" />
          </label>
          <label>
            Status Message
            <textarea name="statusMessage" rows="2"></textarea>
          </label>
          <label>
            Theme
            <select name="theme">
              <option value="classic">Classic</option>
              <option value="ocean">Ocean</option>
              <option value="forest">Forest</option>
            </select>
          </label>
          <label class="inline">
            <input type="checkbox" name="emailOptIn" />
            Email opt-in
          </label>
          <button type="submit">Save Settings</button>
        </form>
      </section>

      <section class="panel">
        <h2>Email Preferences</h2>
        <div class="button-row">
          <button id="enable-email">Enable Email</button>
          <button id="disable-email">Disable Email</button>
        </div>
      </section>

      <section class="panel">
        <h2>Response</h2>
        <pre id="settings-output">Loading...</pre>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/settings.js"></script>
  </body>
</html>
